epochs: 100

optimizer:
  name: adamw
  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.01

scheduler:
  name: cosine
  t_max: 100
  eta_min: 1e-6

grad_accum_steps: 1
mixed_precision: true
amp_dtype: bfloat16
tf32: true

compile:
  enabled: true
  mode: default
  fullgraph: false
  dynamic: false

threads:
  omp: 1
  mkl: 1
  torch: 1
  interop: 1

log_every_steps: 100
vis_every_steps: 1000
eval_every_epochs: 1
val_vis_every_epochs: 1

ckpt:
  save_last_every_epochs: 1
  save_best: true