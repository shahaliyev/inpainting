epochs: 2
max_steps:

optimizer:
  name: adamw
  lr: 0.0001
  betas: [0.9, 0.999]
  weight_decay: 0.01

scheduler:
  name: cosine
  t_max: 2
  eta_min: 1e-6

grad_accum_steps: 1
mixed_precision: false
amp_dtype: bfloat16
tf32: false

compile:
  enabled: false
  mode: default
  fullgraph: false
  dynamic: false

threads:
  omp: 1
  mkl: 1
  torch: 1
  interop: 1

log_every_steps: 1
vis_every_steps: 0
eval_every_epochs: 1
eval_every_steps: 0
val_vis_every_epochs: 0
val_vis_every_steps: 0
metrics:
  scope: mask
  report_both: true
loss:
  name: l1
  weights:
    l1: 1.0
    perceptual: 0.0
    tv: 0.0
  perceptual:
    net: vgg

ckpt:
  save_last_every_epochs: 1
  save_last_every_steps: 0
  save_best: true
  # Stop training after this many eval checks with no val loss improvement.
  # 0 disables early stopping.
  patience: 0
  # No warmup needed for sanity profile.
  min_epochs: 0
  # No tolerance needed for sanity profile.
  min_delta: 0.0
