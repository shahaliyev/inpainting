name: mixed

# One sub-generator is chosen uniformly at random per image.
# Each entry mirrors its standalone YAML so ratios/strokes can be tuned independently.
generators:
  - name: block
    ratios: [5, 10, 20, 30]
    train:
      deterministic: true
    eval:
      deterministic: true

  - name: freeform
    num_strokes: 6
    min_vertices: 4
    max_vertices: 12
    min_brush_width: 8
    max_brush_width: 30
    max_angle: 0.7853981633974483
    min_length: 20
    max_length: 80
    train:
      deterministic: true
    eval:
      deterministic: true

  - name: multi_block
    ratios: [5, 10, 20, 30]
    min_blocks: 2
    max_blocks: 5
    train:
      deterministic: true
    eval:
      deterministic: true

train:
  deterministic: true
eval:
  deterministic: true
